name: Lint

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Verify Admin/LMS Separation
        run: |
          chmod +x scripts/check-admin-lms-separation.sh
          ./scripts/check-admin-lms-separation.sh
