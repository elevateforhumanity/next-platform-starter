name: Deploy LMS
# No-op update to trigger workflow when manual dispatch is unavailable.

on:
  push:
    branches:
      - main
    # LMS deploy source of truth:
    # - app/** and LMS/shared code.
    # - Explicitly excludes legacy app/admin so admin changes do not trigger LMS deploys.
    paths:
      - "app/**"
      - "!app/admin/**"
      - "apps/lms/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "packages/**"
      - "styles/**"
      - "data/**"
      - "types/**"
      - "hooks/**"
      - "contexts/**"
      - "config/**"
      - "content/**"
      - "utils/**"
      - "proxy.ts"
      - "next.config.mjs"
      - "tailwind.config.js"
      - "tsconfig.json"
      - "Dockerfile.package"
      - "aws/buildspec-lms.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-lms.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-lms:
    name: Build and deploy LMS only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Start LMS CodeBuild
        run: |
          aws codebuild start-build \
            --project-name elevate-lms-build \
            --buildspec-override aws/buildspec-lms.yml \
            --region us-east-1
