name: Deploy LMS

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "apps/lms/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "packages/**"
      - "proxy.ts"
      - "next.config.mjs"
      - "tailwind.config.ts"
      - "tsconfig.json"
      - "aws/buildspec-lms.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-lms.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-lms:
    name: Build and deploy LMS only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Start LMS CodeBuild
        run: |
          aws codebuild start-build \
            --project-name elevate-lms-build \
            --region us-east-1
