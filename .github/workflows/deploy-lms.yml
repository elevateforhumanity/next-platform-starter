name: Deploy LMS
# No-op update to trigger workflow when manual dispatch is unavailable.
# Retry trigger marker: 2026-05-22T10:36Z

on:
  push:
    branches:
      - main
    # LMS deploy source of truth:
    # - app/** and LMS/shared code.
    # - Explicitly excludes legacy app/admin so admin changes do not trigger LMS deploys.
    paths:
      - "app/**"
      - "!app/admin/**"
      - "apps/lms/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "packages/**"
      - "styles/**"
      - "data/**"
      - "types/**"
      - "hooks/**"
      - "contexts/**"
      - "config/**"
      - "content/**"
      - "utils/**"
      - "proxy.ts"
      - "next.config.mjs"
      - "tailwind.config.js"
      - "tsconfig.json"
      - "Dockerfile.package"
      - "aws/buildspec-lms.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-lms.yml"

  workflow_dispatch:

permissions:
  contents: read

# Serialize all production deploys. If an admin deploy is in progress this job
# will queue (not cancel) until it finishes, preventing concurrent CodeBuilds.
concurrency:
  group: deploy-lms
  cancel-in-progress: false

jobs:
  deploy-lms:
    name: Build and deploy LMS only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Start LMS CodeBuild and wait for completion
        run: |
          set -euo pipefail

          dump_build_details() {
            echo "::group::CodeBuild failure details"
            aws codebuild batch-get-builds \
              --ids "$BUILD_ID" \
              --region us-east-1 \
              --query 'builds[0].{status:buildStatus,currentPhase:currentPhase,phases:phases[*].{phaseType:phaseType,phaseStatus:phaseStatus}}' \
              --output json || true
            echo "::endgroup::"
          }

          SOURCE_VERSION="${GITHUB_SHA:?Missing GITHUB_SHA}"
          echo "Starting LMS CodeBuild for commit ${SOURCE_VERSION}..."
          BUILD_ID=$(aws codebuild start-build \
            --project-name elevate-lms-build \
            --source-version "$SOURCE_VERSION" \
            --buildspec-override aws/buildspec-lms.yml \
            --region us-east-1 \
            --query 'build.id' --output text)
          echo "Build ID: $BUILD_ID"

          echo "Waiting for build to complete (polls every 30s)..."
          while true; do
            STATUS=$(aws codebuild batch-get-builds \
              --ids "$BUILD_ID" \
              --region us-east-1 \
              --query 'builds[0].buildStatus' \
              --output text)
            echo "  Status: $STATUS"
            case "$STATUS" in
              SUCCEEDED)
                echo "✅ LMS build succeeded."
                exit 0
                ;;
              FAILED|FAULT|TIMED_OUT|STOPPED)
                echo "❌ LMS build failed with status: $STATUS"
                dump_build_details
                exit 1
                ;;
            esac
            sleep 30
          done

      - name: Confirm ECS deployment was triggered
        run: |
          set -euo pipefail
          aws ecs describe-services \
            --cluster elevate-cluster \
            --services elevate-lms-service \
            --region us-east-1 \
            --query 'services[0].{taskDef:taskDefinition,deployments:deployments[*].{status:status,rollout:rolloutState,running:runningCount,failed:failedTasks}}' \
            --output json

      - name: Wait for ECS service stability
        run: |
          set -euo pipefail
          echo "Waiting for ECS service to stabilize (max 60 minutes)..."
          if ! timeout 3600 aws ecs wait services-stable \
            --cluster elevate-cluster \
            --services elevate-lms-service \
            --region us-east-1; then
            echo "::error::LMS ECS did not stabilize in time."
            exit 1
          fi
          echo "✅ ECS service stable."

      - name: Health check — LMS
        id: health_check
        run: |
          echo "Running post-deploy health check..."
          MAX_ATTEMPTS=10
          DELAY=15
          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "https://www.elevateforhumanity.org/api/health" 2>/dev/null || echo "000")
            echo "  Attempt $i/$MAX_ATTEMPTS — HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed."
              exit 0
            fi
            sleep $DELAY
          done
          echo "❌ Health check failed after $MAX_ATTEMPTS attempts."
          exit 1

      - name: Rollback on health failure
        if: failure() && steps.health_check.outcome == 'failure'
        run: |
          echo "⚠️  Health check failed — rolling back LMS service to previous task definition..."
          PREV_TASK=$(aws ecs describe-services \
            --cluster elevate-cluster \
            --services elevate-lms-service \
            --region us-east-1 \
            --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition' \
            --output text)
          echo "Current task: $PREV_TASK"
          # Force new deployment of the previous stable task definition
          # (CodeBuild already registered the new one; ECS will drain and revert)
          aws ecs update-service \
            --cluster elevate-cluster \
            --service elevate-lms-service \
            --force-new-deployment \
            --region us-east-1 \
            --query 'service.serviceName' \
            --output text
          echo "Rollback initiated. Monitor ECS console for completion."
          exit 1
# Deploy trigger: 2026-05-27T13:47Z
