name: Deploy LMS

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '!app/admin/**'
      - 'apps/lms/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'packages/**'
      - 'styles/**'
      - 'data/**'
      - 'types/**'
      - 'hooks/**'
      - 'contexts/**'
      - 'config/**'
      - 'content/**'
      - 'utils/**'
      - 'proxy.ts'
      - 'next.config.mjs'
      - 'tailwind.config.js'
      - 'tsconfig.json'
      - 'Dockerfile.northflank-lms'
      - 'scripts/northflank/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-lms.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: northflank-lms-deploy
  cancel-in-progress: false

jobs:
  deploy-lms:
    name: Build and deploy LMS on Northflank
    runs-on: ubuntu-latest
    env:
      NORTHFLANK_API_TOKEN: ${{ secrets.NORTHFLANK_API_TOKEN }}
      NORTHFLANK_TEAM_ID: ${{ secrets.NORTHFLANK_TEAM_ID || 'elevates-team' }}
      NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID || 'elevate-platform' }}
      NORTHFLANK_LMS_SERVICE_ID: ${{ secrets.NORTHFLANK_LMS_SERVICE_ID || 'elevate-lms' }}
      NORTHFLANK_TARGET_SERVICE: lms
      DEPLOY_BRANCH: main
      NORTHFLANK_EPHEMERAL_STORAGE_MB: '32768'
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Configure Northflank LMS service only
        run: pnpm tsx scripts/northflank/configure-services.ts "$NORTHFLANK_LMS_SERVICE_ID" --execute

      - name: Patch LMS build ephemeral storage
        run: pnpm tsx scripts/northflank/patch-ephemeral-storage.ts "$NORTHFLANK_LMS_SERVICE_ID" --execute

      - name: Verify LMS health probes on /api/ping
        run: pnpm tsx scripts/northflank/verify-health-checks.ts "$NORTHFLANK_LMS_SERVICE_ID"

      - name: Point LMS service at main
        run: pnpm tsx scripts/northflank/set-service-branch.ts "$NORTHFLANK_LMS_SERVICE_ID" "$DEPLOY_BRANCH"

      - name: Trigger LMS build
        id: trigger_lms_build
        run: pnpm tsx scripts/northflank/trigger-build.ts "$NORTHFLANK_LMS_SERVICE_ID"

      - name: Roll out latest LMS image
        run: pnpm tsx scripts/northflank/trigger-deployment.ts "$NORTHFLANK_LMS_SERVICE_ID"

      - name: Wait for LMS deployment
        run: pnpm tsx scripts/northflank/wait-service.ts "$NORTHFLANK_LMS_SERVICE_ID" --build-id "${{ steps.trigger_lms_build.outputs.build_id }}" --timeout-ms 3600000

      - name: Verify deployed SHA matches main
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          # If deploy is stale due to concurrent workflows, trust SUCCESS/COMPLETED status
          pnpm tsx scripts/northflank/verify-deployed-sha.ts elevate-lms --trust-deploy-status

      - name: Smoke LMS
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            status=$(curl -sk --max-time 10 -o /tmp/lms-health.json -w "%{http_code}" https://www.elevateforhumanity.org/api/ping || true)
            body=$(cat /tmp/lms-health.json 2>/dev/null || true)
            if [ "$status" = "200" ] && echo "$body" | grep -q '"ok":true'; then
              echo "LMS liveness passed."
              exit 0
            fi
            echo "LMS liveness not ready yet: HTTP ${status}. Retry ${i}/20."
            sleep 15
          done
          echo "LMS liveness failed after deploy."
          cat /tmp/lms-health.json 2>/dev/null || true
          exit 1
