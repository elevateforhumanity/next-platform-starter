name: Deploy Admin
# Retry trigger marker: 2026-05-14T19:30Z

on:
  push:
    branches:
      - main
    # Admin deploy source of truth:
    # - Only trigger from apps/admin and shared libs used by admin.
    # - Do not add app/** here (that is LMS container scope).
    paths:
      - "apps/admin/**"
      - "lib/**"
      - "components/**"
      - "data/**"
      - "types/**"
      - "styles/**"
      - "hooks/**"
      - "contexts/**"
      - "config/**"
      - "content/**"
      - "utils/**"
      - "packages/**"
      - "Dockerfile.admin"
      - "aws/buildspec-admin.yml"
      - "aws/ecs-task-admin.json"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-admin.yml"

  workflow_dispatch:

permissions:
  contents: read

# Serialize all production deploys. If an LMS deploy is in progress this job
# will queue (not cancel) until it finishes, preventing concurrent CodeBuilds.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-admin:
    name: Build and deploy admin only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Start Admin CodeBuild and wait for completion
        run: |
          echo "Starting Admin CodeBuild..."
          BUILD_ID=$(aws codebuild start-build \
            --project-name elevate-admin-build \
            --buildspec-override aws/buildspec-admin.yml \
            --region us-east-1 \
            --query 'build.id' --output text)
          echo "Build ID: $BUILD_ID"

          echo "Waiting for build to complete (polls every 30s)..."
          while true; do
            STATUS=$(aws codebuild batch-get-builds \
              --ids "$BUILD_ID" \
              --region us-east-1 \
              --query 'builds[0].buildStatus' \
              --output text)
            echo "  Status: $STATUS"
            case "$STATUS" in
              SUCCEEDED)
                echo "✅ Admin build succeeded."
                exit 0
                ;;
              FAILED|FAULT|TIMED_OUT|STOPPED)
                echo "❌ Admin build failed with status: $STATUS"
                exit 1
                ;;
            esac
            sleep 30
          done
