name: Deploy Admin
# Retry trigger marker: 2026-05-22T10:36Z

on:
  push:
    branches:
      - main
    # Admin deploy source of truth:
    # - Only trigger from apps/admin and shared libs used by admin.
    # - Do not add app/** here (that is LMS container scope).
    paths:
      - "apps/admin/**"
      - "lib/**"
      - "components/**"
      - "data/**"
      - "types/**"
      - "styles/**"
      - "hooks/**"
      - "contexts/**"
      - "config/**"
      - "content/**"
      - "utils/**"
      - "packages/**"
      - "Dockerfile.admin"
      - "aws/buildspec-admin.yml"
      - "aws/ecs-task-admin.json"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-admin.yml"

  workflow_dispatch:

permissions:
  contents: read

# Serialize admin deploys independently of LMS deploys.
# Separate concurrency group prevents LMS pushes from cancelling queued admin runs.
concurrency:
  group: deploy-admin
  cancel-in-progress: false

jobs:
  deploy-admin:
    name: Build and deploy admin only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Start Admin CodeBuild and wait for completion
        run: |
          echo "Starting Admin CodeBuild..."
          BUILD_ID=$(aws codebuild start-build \
            --project-name elevate-admin-build \
            --buildspec-override aws/buildspec-admin.yml \
            --region us-east-1 \
            --query 'build.id' --output text)
          echo "Build ID: $BUILD_ID"

          echo "Waiting for build to complete (polls every 30s)..."
          while true; do
            STATUS=$(aws codebuild batch-get-builds \
              --ids "$BUILD_ID" \
              --region us-east-1 \
              --query 'builds[0].buildStatus' \
              --output text)
            echo "  Status: $STATUS"
            case "$STATUS" in
              SUCCEEDED)
                echo "✅ Admin build succeeded."
                exit 0
                ;;
              FAILED|FAULT|TIMED_OUT|STOPPED)
                echo "❌ Admin build failed with status: $STATUS"
                exit 1
                ;;
            esac
            sleep 30
          done

      - name: Wait for ECS service stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster elevate-cluster \
            --services elevate-admin-service \
            --region us-east-1
          echo "✅ ECS service stable."

      - name: Health check — Admin
        id: health_check
        run: |
          echo "Running post-deploy health check..."
          MAX_ATTEMPTS=10
          DELAY=15
          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "https://admin.elevateforhumanity.org/api/cron/health" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" 2>/dev/null || echo "000")
            echo "  Attempt $i/$MAX_ATTEMPTS — HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed."
              exit 0
            fi
            sleep $DELAY
          done
          echo "❌ Health check failed after $MAX_ATTEMPTS attempts."
          exit 1

      - name: Rollback on health failure
        if: failure() && steps.health_check.outcome == 'failure'
        run: |
          echo "⚠️  Health check failed — rolling back Admin service to previous task definition..."
          aws ecs update-service \
            --cluster elevate-cluster \
            --service elevate-admin-service \
            --force-new-deployment \
            --region us-east-1 \
            --query 'service.serviceName' \
            --output text
          echo "Rollback initiated. Monitor ECS console for completion."
          exit 1
