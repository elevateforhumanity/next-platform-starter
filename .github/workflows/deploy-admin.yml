name: Deploy Admin

on:
  push:
    branches:
      - main
    paths:
      - 'app/admin/**'
      - 'app/api/admin/**'
      - 'apps/admin/**'
      - 'lib/**'
      - 'components/**'
      - 'data/**'
      - 'types/**'
      - 'styles/**'
      - 'hooks/**'
      - 'contexts/**'
      - 'config/**'
      - 'content/**'
      - 'utils/**'
      - 'packages/**'
      - 'Dockerfile.northflank-admin'
      - 'scripts/northflank/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: northflank-admin-deploy
  cancel-in-progress: false

jobs:
  deploy-admin:
    name: Build and deploy admin on Northflank
    runs-on: ubuntu-latest
    env:
      NORTHFLANK_API_TOKEN: ${{ secrets.NORTHFLANK_API_TOKEN }}
      NORTHFLANK_TEAM_ID: ${{ secrets.NORTHFLANK_TEAM_ID || 'elevates-team' }}
      NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID || 'elevate-platform' }}
      NORTHFLANK_ADMIN_SERVICE_ID: ${{ secrets.NORTHFLANK_ADMIN_SERVICE_ID || 'elevate-admin' }}
      NORTHFLANK_TARGET_SERVICE: admin
      DEPLOY_BRANCH: main
      NORTHFLANK_EPHEMERAL_STORAGE_MB: '32768'
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ONET_API_KEY: ${{ secrets.ONET_API_KEY }}
      CAREERONESTOP_USER_ID: ${{ secrets.CAREERONESTOP_USER_ID }}
      CAREERONESTOP_TOKEN: ${{ secrets.CAREERONESTOP_TOKEN }}
      USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Configure Northflank admin service only
        run: pnpm tsx scripts/northflank/configure-services.ts "$NORTHFLANK_ADMIN_SERVICE_ID" --execute

      - name: Patch admin build ephemeral storage
        run: pnpm tsx scripts/northflank/patch-ephemeral-storage.ts "$NORTHFLANK_ADMIN_SERVICE_ID" --execute

      - name: Verify admin health probes on /api/ping
        run: pnpm tsx scripts/northflank/verify-health-checks.ts "$NORTHFLANK_ADMIN_SERVICE_ID"

      - name: Point admin service at main
        run: pnpm tsx scripts/northflank/set-service-branch.ts "$NORTHFLANK_ADMIN_SERVICE_ID" "$DEPLOY_BRANCH"

      - name: Trigger admin build
        id: trigger_admin_build
        run: pnpm tsx scripts/northflank/trigger-build.ts "$NORTHFLANK_ADMIN_SERVICE_ID"

      - name: Roll out latest admin image
        run: pnpm tsx scripts/northflank/trigger-deployment.ts "$NORTHFLANK_ADMIN_SERVICE_ID"

      - name: Wait for admin deployment
        run: pnpm tsx scripts/northflank/wait-service.ts "$NORTHFLANK_ADMIN_SERVICE_ID" --build-id "${{ steps.trigger_admin_build.outputs.build_id }}" --timeout-ms 1200000

      - name: Smoke admin
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            status=$(curl -sk --max-time 10 -o /tmp/admin-health.json -w "%{http_code}" https://admin.elevateforhumanity.org/api/ping || true)
            body=$(cat /tmp/admin-health.json 2>/dev/null || true)
            if [ "$status" = "200" ] && echo "$body" | grep -q '"ok":true'; then
              echo "Admin liveness passed."
              exit 0
            fi
            echo "Admin liveness not ready yet: HTTP ${status}. Retry ${i}/20."
            sleep 15
          done
          echo "Admin liveness failed after deploy."
          cat /tmp/admin-health.json 2>/dev/null || true
          exit 1

      - name: Verify deployed SHA matches main
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          # If deploy is stale due to concurrent workflows, trust SUCCESS/COMPLETED status
          pnpm tsx scripts/northflank/verify-deployed-sha.ts elevate-admin --trust-deploy-status
