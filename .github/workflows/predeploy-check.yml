name: Pre-deploy Check

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: predeploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-doctor:
    name: Platform Doctor
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Platform Doctor (PR)
        if: github.event_name == 'pull_request'
        run: pnpm platform:doctor
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          SKIP_ENV_VALIDATION: 'true'

      - name: Run Platform Doctor Strict (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm platform:doctor:strict
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          SKIP_ENV_VALIDATION: 'true'

      - name: Upload Platform Doctor artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-doctor-artifacts
          path: |
            artifacts/platform-doctor-report.json
            artifacts/design-enforcer-report.json
            artifacts/image-contract-report.json
            artifacts/program-template-audit-report.json
            reports/platform_polish_report.json
          retention-days: 14

      - name: Explain failure severity (CRITICAL vs STRICT)
        if: failure()
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const p = 'artifacts/platform-doctor-report.json';
          if (!fs.existsSync(p)) {
            console.log('::error::Platform Doctor failed before report was generated.');
            process.exit(0);
          }
          const r = JSON.parse(fs.readFileSync(p, 'utf8'));
          const c = r.countsBySeverity || { CRITICAL: 0, STRICT: 0, REPORT: 0 };
          console.log(`::error::Platform Doctor blocked deploy. CRITICAL=${c.CRITICAL}, STRICT=${c.STRICT}, REPORT=${c.REPORT}`);
          if ((c.CRITICAL || 0) > 0) {
            console.log('::error::CRITICAL issues must be fixed on all branches.');
          }
          if ((c.STRICT || 0) > 0) {
            console.log('::warning::STRICT issues are report-only unless PLATFORM_DOCTOR_ENFORCE_STRICT or PLATFORM_DOCTOR_BLOCK_STRICT_ON_MAIN is enabled.');
          }
          NODE
