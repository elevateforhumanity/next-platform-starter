name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-aws
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECR_REGISTRY: 954718262498.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: elevate-cluster

jobs:
  build-lms:
    name: Build LMS
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull public build vars from SSM
        run: |
          get() { aws ssm get-parameter --name "/elevate/$1" --with-decryption --query Parameter.Value --output text; }
          echo "NEXT_PUBLIC_SUPABASE_URL=$(get NEXT_PUBLIC_SUPABASE_URL)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(get NEXT_PUBLIC_SUPABASE_ANON_KEY)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SITE_URL=$(get NEXT_PUBLIC_SITE_URL)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$(get NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_GA_MEASUREMENT_ID=$(get NEXT_PUBLIC_GA_MEASUREMENT_ID)" >> $GITHUB_ENV

      - name: Set image tag
        id: meta
        run: |
          TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_ENV
          echo "image=${{ env.ECR_REGISTRY }}/elevate-lms:$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.railway
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/elevate-lms:${{ env.tag }}
            ${{ env.ECR_REGISTRY }}/elevate-lms:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ env.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          cache-from: type=gha,scope=lms
          cache-to: type=gha,mode=max,scope=lms

  build-admin:
    name: Build Admin
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull public build vars from SSM
        run: |
          get() { aws ssm get-parameter --name "/elevate/$1" --with-decryption --query Parameter.Value --output text; }
          echo "NEXT_PUBLIC_SUPABASE_URL=$(get NEXT_PUBLIC_SUPABASE_URL)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(get NEXT_PUBLIC_SUPABASE_ANON_KEY)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SITE_URL=$(get NEXT_PUBLIC_SITE_URL)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$(get NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY)" >> $GITHUB_ENV

      - name: Set image tag
        id: meta
        run: |
          TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_ENV
          echo "image=${{ env.ECR_REGISTRY }}/elevate-admin:$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.admin
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/elevate-admin:${{ env.tag }}
            ${{ env.ECR_REGISTRY }}/elevate-admin:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

  deploy-lms:
    name: Deploy LMS
    runs-on: ubuntu-latest
    needs: build-lms
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: aws/ecs-task-lms.json
          container-name: elevate-lms
          image: ${{ needs.build-lms.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: elevate-lms-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Health check
        run: |
          curl -sf --max-time 30 http://elevate-lms-alb-1854717895.us-east-1.elb.amazonaws.com/ \
            -o /dev/null && echo "LMS healthy" || echo "LMS warming up"

  deploy-admin:
    name: Deploy Admin
    runs-on: ubuntu-latest
    needs: build-admin
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: aws/ecs-task-admin.json
          container-name: elevate-admin
          image: ${{ needs.build-admin.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: elevate-admin-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Health check
        run: |
          curl -sf --max-time 30 http://elevate-admin-alb-803695409.us-east-1.elb.amazonaws.com/ \
            -o /dev/null && echo "Admin healthy" || echo "Admin warming up"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [deploy-lms, deploy-admin]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Deploy: \`$(echo ${{ github.sha }} | cut -c1-7)\`" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| LMS | ${{ needs.deploy-lms.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin | ${{ needs.deploy-admin.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "LMS: https://www.elevateforhumanity.org" >> $GITHUB_STEP_SUMMARY
          echo "Admin: https://admin.elevateforhumanity.org" >> $GITHUB_STEP_SUMMARY
