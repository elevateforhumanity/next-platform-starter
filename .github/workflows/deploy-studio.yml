name: Deploy Studio Shell
# Retry trigger marker: 2026-05-22T10:36Z

on:
  push:
    branches:
      - main
    paths:
      - 'studio-shell/**'
      - 'Dockerfile.studio'
      - 'aws/ecs-task-studio.json'
      - '.github/workflows/deploy-studio.yml'
  workflow_dispatch:

env:
  AWS_REGION:           us-east-1
  ECR_REGISTRY:         954718262498.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY:       elevate-studio
  ECS_CLUSTER:          elevate-cluster
  ECS_SERVICE:          elevate-studio
  TASK_DEFINITION:      aws/ecs-task-studio.json
  CONTAINER_NAME:       elevate-studio
  # Cloud Map service discovery — stable DNS, no IP hardcoding needed
  CLOUD_MAP_SERVICE_ID: srv-lcwsq3yw4g2ja5wa
  SUBNETS:              subnet-0a171d95bf4674863,subnet-0a2d8af9bb5d1b0b0,subnet-08f76a2d8f68db65b
  SECURITY_GROUPS:      sg-04e101227cc967c15

jobs:
  deploy:
    name: Build & Deploy Studio Shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f Dockerfile.studio \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build.outputs.image }}

      - name: Ensure ECS service exists
        run: |
          STATUS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")

          if [ "$STATUS" != "ACTIVE" ]; then
            echo "Service not found — creating with Cloud Map service discovery"
            aws ecs create-service \
              --cluster $ECS_CLUSTER \
              --service-name $ECS_SERVICE \
              --task-definition $ECS_SERVICE \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SECURITY_GROUPS],assignPublicIp=ENABLED}" \
              --service-registries "registryArn=arn:aws:servicediscovery:$AWS_REGION:954718262498:service/$CLOUD_MAP_SERVICE_ID" \
              --enable-execute-command
          else
            echo "Service exists (status: $STATUS) — proceeding with update"
          fi

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:  ${{ steps.task-def.outputs.task-definition }}
          service:          ${{ env.ECS_SERVICE }}
          cluster:          ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Set SSM params and update public IP
        # Sets the three SSM params the admin ECS task reads at startup:
        #   STUDIO_SHELL_WS_URL     — internal Cloud Map URL (admin → studio)
        #   STUDIO_SHELL_SECRET     — shared secret (generated once, stable)
        #   STUDIO_TOKEN_SECRET     — HMAC secret for shell-token route
        # Also writes the public IP for local dev use.
        run: |
          INTERNAL_URL="ws://elevate-studio.elevate.local:8888"

          # Generate a stable secret if one doesn't already exist
          EXISTING_SECRET=$(aws ssm get-parameter \
            --name /elevate/STUDIO_SHELL_SECRET \
            --with-decryption \
            --query Parameter.Value \
            --output text 2>/dev/null || echo "")

          if [ -z "$EXISTING_SECRET" ]; then
            SHELL_SECRET=$(openssl rand -hex 32)
            aws ssm put-parameter \
              --name /elevate/STUDIO_SHELL_SECRET \
              --value "$SHELL_SECRET" \
              --type SecureString \
              --overwrite
            echo "Generated new STUDIO_SHELL_SECRET"
          else
            SHELL_SECRET="$EXISTING_SECRET"
            echo "STUDIO_SHELL_SECRET already set"
          fi

          # STUDIO_TOKEN_SECRET — reuse shell secret if not separately set
          EXISTING_TOKEN_SECRET=$(aws ssm get-parameter \
            --name /elevate/STUDIO_TOKEN_SECRET \
            --with-decryption \
            --query Parameter.Value \
            --output text 2>/dev/null || echo "")

          if [ -z "$EXISTING_TOKEN_SECRET" ]; then
            TOKEN_SECRET=$(openssl rand -hex 32)
            aws ssm put-parameter \
              --name /elevate/STUDIO_TOKEN_SECRET \
              --value "$TOKEN_SECRET" \
              --type SecureString \
              --overwrite
            echo "Generated new STUDIO_TOKEN_SECRET"
          else
            echo "STUDIO_TOKEN_SECRET already set"
          fi

          # Internal URL — always update to Cloud Map DNS
          aws ssm put-parameter \
            --name /elevate/STUDIO_SHELL_WS_URL \
            --value "$INTERNAL_URL" \
            --type String \
            --overwrite
          echo "Set STUDIO_SHELL_WS_URL = $INTERNAL_URL"

          # Public IP for local dev
          TASK_ARN=$(aws ecs list-tasks \
            --cluster $ECS_CLUSTER \
            --service-name $ECS_SERVICE \
            --query 'taskArns[0]' --output text 2>/dev/null || echo "")

          if [ -n "$TASK_ARN" ] && [ "$TASK_ARN" != "None" ]; then
            ENI=$(aws ecs describe-tasks \
              --cluster $ECS_CLUSTER --tasks "$TASK_ARN" \
              --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
              --output text 2>/dev/null || echo "")

            if [ -n "$ENI" ] && [ "$ENI" != "None" ]; then
              PUBLIC_IP=$(aws ec2 describe-network-interfaces \
                --network-interface-ids "$ENI" \
                --query 'NetworkInterfaces[0].Association.PublicIp' \
                --output text 2>/dev/null || echo "")

              if [ -n "$PUBLIC_IP" ] && [ "$PUBLIC_IP" != "None" ]; then
                aws ssm put-parameter \
                  --name /elevate/STUDIO_SHELL_WS_URL_PUBLIC \
                  --value "ws://${PUBLIC_IP}:8888" \
                  --type String \
                  --overwrite
                echo "Set STUDIO_SHELL_WS_URL_PUBLIC = ws://${PUBLIC_IP}:8888"
              fi
            fi
          fi

          echo "### Studio Shell deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Internal (ECS):** $INTERNAL_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **SSM params set:** STUDIO_SHELL_WS_URL, STUDIO_SHELL_SECRET, STUDIO_TOKEN_SECRET" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Update \`STUDIO_SHELL_WS_URL\` in \`.env.local\` to \`ws://${PUBLIC_IP}:8888\`" >> $GITHUB_STEP_SUMMARY
