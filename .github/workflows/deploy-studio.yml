name: Deploy Studio Shell

on:
  push:
    branches:
      - main
    paths:
      - 'studio-shell/**'
      - 'Dockerfile.studio'
      - 'aws/ecs-task-studio.json'
      - '.github/workflows/deploy-studio.yml'
  workflow_dispatch:

env:
  AWS_REGION:      us-east-1
  ECR_REGISTRY:    954718262498.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY:  elevate-studio
  ECS_CLUSTER:     elevate-cluster
  ECS_SERVICE:     elevate-studio
  TASK_DEFINITION: aws/ecs-task-studio.json
  CONTAINER_NAME:  elevate-studio

jobs:
  deploy:
    name: Build & Deploy Studio Shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f Dockerfile.studio \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION }}
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:  ${{ steps.task-def.outputs.task-definition }}
          service:          ${{ env.ECS_SERVICE }}
          cluster:          ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
