name: Supabase Migrations

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seeds/**'
    branches:
      - main

jobs:
  supabase-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint migrations
        run: node scripts/lint-migrations.cjs

      - name: Apply migrations
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/db/runMigrations.js

      - name: Verify lms_lessons
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node -e "
          const url = process.env.NEXT_PUBLIC_SUPABASE_URL;
          const key = process.env.SUPABASE_SERVICE_ROLE_KEY;
          fetch(url + '/rest/v1/lms_lessons?course_id=eq.0ba9a61c-1f1b-4019-be6f-90e92eba2bc0&select=count', {
            headers: { apikey: key, Authorization: 'Bearer ' + key, Prefer: 'count=exact' }
          }).then(r => r.json()).then(d => {
            const count = d[0]?.count;
            console.log('HVAC lms_lessons:', count);
            if (parseInt(count) !== 95) process.exit(1);
          });
          "

      - name: Notify success
        if: success()
        run: echo "Migrations complete"

      - name: Notify failure
        if: failure()
        run: echo "Migrations failed"
