name: Integrity Gate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC

concurrency:
  group: integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    runs-on: ubuntu-latest
    # Integrity checks analyse source files — they do not require a webpack
    # build. The full build runs in ci-cd.yml. Timeout raised to 30 min to
    # accommodate the daily scheduled run which starts cold.
    timeout-minutes: 30
    env:
      NODE_OPTIONS: '--max-old-space-size=6144'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pre-auth registry check — runs before build, no secrets needed.
      # Fails if any public-write route inserts into a table not declared in
      # lib/pre-auth-tables.ts. Blocks merge on unregistered pre-auth tables.
      # To fix: register the table or add // pre-auth-registry: exempt — <reason>
      - name: Pre-auth registry check
        run: node scripts/check-pre-auth-registry.cjs

      # Grants audit context check — no secrets needed.
      # Fails if any function writes to an auditable grants table without
      # calling setAuditContext() first. Blocks merge on missing audit attribution.
      # To add a new auditable table: update AUDITABLE_TABLES in the script.
      # To exempt a read-only or user-action write: add // grants-audit: exempt — <reason>
      - name: Grants audit context check
        run: node scripts/check-grants-audit-context.cjs

      # Migration lint — runs before any other check, no secrets needed
      - name: Migration lint
        run: node scripts/lint-migrations.cjs

      - name: Production readiness gate (auth + scripts)
        run: SKIP_BUILD_GATE=1 bash scripts/production-readiness-gate.sh

      # Integrity checks - each fails the build if issues found
      - name: Link integrity check
        run: pnpm run integrity:links

      - name: Media integrity check
        run: pnpm run integrity:media

      - name: LMS course integrity check
        run: pnpm run integrity:lms
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Store product integrity check
        run: pnpm run integrity:store
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Analytics integrity check
        run: pnpm run integrity:analytics

      - name: Self-service policy check
        run: pnpm run integrity:self-service

      - name: Program catalog integrity check
        run: pnpm run integrity:programs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload integrity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-reports
          path: |
            reports/link_report.json
            reports/media_report.json
            reports/lms_integrity_report.json
            reports/store_integrity_report.json
            reports/pre_auth_registry_report.json
            reports/grants_audit_context_report.json
          retention-days: 30
