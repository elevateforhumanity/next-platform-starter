services:
  admin-dev:
    name: Admin Dev Server
    description: Next.js Admin dashboard — primary working preview
    commands:
      start: bash .devcontainer/setup-env.sh 2>/dev/null || true && pnpm dev:admin
      ready: curl -sf http://localhost:3001 > /dev/null
    triggeredBy:
      - postEnvironmentStart

  lms-dev:
    name: LMS Dev Server
    description: Next.js LMS app — start manually when needed (saves memory)
    commands:
      start: bash .devcontainer/setup-env.sh 2>/dev/null || true && pnpm dev
      ready: curl -sf http://localhost:3000 > /dev/null
    # Not auto-started — run: gitpod automations service start lms-dev
