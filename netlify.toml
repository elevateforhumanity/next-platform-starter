# Social Media Scheduler - can be re-enabled now that env vars are in
# Supabase app_secrets (no longer hits Lambda 4KB limit).
# Social media auto-posting — 9 AM, 1 PM, 5 PM ET
# Posts active campaigns + blog posts + reels to Facebook, LinkedIn, Instagram
# Requires: CRON_SECRET, FACEBOOK_PAGE_ID, FACEBOOK_ACCESS_TOKEN,
#           LINKEDIN_ACCESS_TOKEN, LINKEDIN_ORGANIZATION_ID
[functions."cron-social-media"]
  schedule = "0 14,18,22 * * *"

# Compliance expiration — weekly, Monday 3 AM ET
# Finds provider_compliance_artifacts expiring within 30 days and queues notifications.
# Requires CRON_SECRET env var in Netlify site settings.
# Testing center no-show enforcement — nightly 2 AM ET
# Marks missed confirmed bookings as no-show, creates $50 rescheduling fee holds.
# Requires CRON_SECRET env var.
[functions."cron-testing-no-show"]
  schedule = "0 7 * * *"

[functions."cron-compliance-expiration"]
  schedule = "0 8 * * 1"

# Pre-auth orphan detection — daily 06:00 UTC
# Alerts if any pre-auth table has rows with user_id IS NULL and a matching profile.
# See lib/pre-auth-tables.ts for the registry and scripts/detect-orphaned-rows.sql
# for the manual equivalent.
[functions."cron-orphan-check"]
  schedule = "0 6 * * *"

# Onboarding reminder — weekly, Monday 9 AM ET
# Nudges providers with incomplete onboarding steps.
# Requires CRON_SECRET env var in Netlify site settings.
[functions."cron-onboarding-reminder"]
  schedule = "0 14 * * 1"

# IRS MeF ACK polling — every 5 minutes during filing season.
# Polls mef_submissions with status in (transmitting, pending_ack, transmitted).
# Requires CRON_SECRET and IRS_SOFTWARE_ID env vars.
# IRS does not push ACKs — transmitter must poll.
[functions."cron-poll-mef-acks"]
  schedule = "*/5 * * * *"

# Exam booking lead follow-up — hourly.
# Sends 24hr and 48hr reminder emails to leads that captured email but never booked.
# Requires CRON_SECRET env var.
[functions."cron-testing-lead-followup"]
  schedule = "0 * * * *"

[functions."cron-payout-deadline-alert"]
  schedule = "0 9 * * *"

[functions."cron-school-application-followup"]
  schedule = "0 14 * * *"

