# Netlify Configuration - Elevate for Humanity
# Canonical domain: www.elevateforhumanity.org (with www)
# Admin domain: elevateconnectsdirectory.org (separate admin panel)

[build]
  # libxml2-utils provides xmllint, required for IRS MeF XSD validation.
  # Without it, schema-validator.ts returns XMLLINT_NOT_AVAILABLE and blocks all submissions.
  command = "corepack enable && pnpm install --no-frozen-lockfile && npx tsx scripts/ci-token-gate.ts && node scripts/check-netlify-env-size.mjs && node scripts/netlify-quarantine-railway-routes.mjs && node scripts/netlify-quarantine-functions.mjs && node scripts/validate-programs.mjs && pnpm run build && node scripts/netlify-route-guard.mjs && node scripts/check-netlify-public-links.mjs && node scripts/prune-standalone.mjs && node scripts/prune-node-modules.mjs"
  # Order: env-size → quarantine routes → quarantine functions → build → route guard → public link check → prune.
  # Do not increase heap to hide leakage — fix the quarantine allowlist instead.
  # publish is intentionally omitted — @netlify/plugin-nextjs manages the output directory.
  # Setting publish = ".next" causes Turbopack to error: distDirRoot navigates outside projectPath.
  functions = "netlify/functions"

[build.processing]
  skip_processing = false



# Block preview and branch deployments from search engine indexing
[context.deploy-preview]
  [context.deploy-preview.environment]
    ROBOTS_NOINDEX = "true"

[context.branch-deploy]
  [context.branch-deploy.environment]
    ROBOTS_NOINDEX = "true"

[build.environment]
  NODE_VERSION = "20"
  # Explicitly set so next.config.mjs can gate Netlify-specific behaviour.
  # Netlify injects this automatically but it may not be present when
  # next.config.mjs is first evaluated by the build process.
  NETLIFY = "true"
  # 8192 MB old-gen heap for the Next.js webpack build (2,670 pages+routes).
  # Netlify build containers have ~8 GB RAM; OS + pnpm install use ~512 MB.
  # --max-semi-space-size=64 keeps young-gen small so GC runs more frequently,
  # reducing peak RSS before mark-compact. --expose-gc lets Next.js call gc()
  # between page compilations to reclaim heap proactively.
  # Both the main Next.js process and the webpack worker child inherit this.
  # Netlify containers have ~8 GB RAM. At 6144 MB each, two processes can
  # exceed physical RAM and trigger OOM kills. Set to 4096 so both fit:
  #   Main: ~1.5 GB peak + Worker: ~4 GB peak = ~5.5 GB total.
  # --expose-gc enables gc() call between deferredEntries compile passes.
  # 4096MB heap. Quarantine removes ~1,400 Railway pages before next build,
  # leaving ~247 marketing routes. webpack comfortably fits in 4GB at this scale.
  # If this OOMs, the quarantine is leaking — fix the allowlist, not the heap.
  NODE_OPTIONS = "--max-old-space-size=4096 --max-semi-space-size=32"
  NEXT_PRIVATE_WORKERS_PER_JOB = "1"
  NEXT_PRIVATE_BUILD_WORKER_COUNT = "1"
  SENTRY_SKIP_AUTO_INSTRUMENTATION = "1"
  NETLIFY_USE_PNPM = "true"
  # Disable secret scanning — NEXT_PUBLIC_* vars are intentionally public
  SECRETS_SCAN_ENABLED = "false"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXTAUTH_URL"
  # NHA account — non-secret, safe to store here
  NHA_ACCOUNT_NUMBER = "412957"
  NHA_PORTAL_URL = "https://www.nhanow.com/"
  # Admin dev tools - enabled for all builds, production guards handle access
  ENABLE_ADMIN_DEVTOOLS = "true"
  # Skip browser binary downloads — reduces install time significantly
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  PUPPETEER_SKIP_DOWNLOAD = "1"
  NEXT_TELEMETRY_DISABLED = "1"


# ---------------------------------------------------------------------------
# ENV VAR STRATEGY (Lambda 4 KB limit)
#
# AWS Lambda limits environment variables to 4 KB per function. Netlify
# injects ALL site env vars into every function, including the Next.js
# SSR handler. With 160+ vars this exceeds the limit and deploys fail.
#
# Solution: only 3 bootstrap vars stay in Netlify site settings:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#
# All other secrets live in the Supabase `app_secrets` table and are
# loaded at runtime via lib/secrets.ts → hydrateProcessEnv().
# The Next.js instrumentation hook (instrumentation.ts) calls this on
# server startup. Standalone Netlify functions use
# netlify/lib/secrets-standalone.ts.
#
# NEXT_PUBLIC_* vars needed at build time should be set with scope
# "Builds" in Netlify dashboard (not "Functions").
#
# To seed app_secrets: bash scripts/seed-app-secrets.sh > /tmp/seed.sql
# Then run in Supabase SQL Editor.
# ---------------------------------------------------------------------------

# Edge function: proxy /api/* to Railway before Next.js handler intercepts
[[edge_functions]]
  function = "api-proxy"
  path = "/api/*"

[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = [".next/cache", "node_modules/.cache"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Runs after plugin-nextjs onBuild to strip heavy packages from the handler
# before Netlify zips and uploads it. Keeps the bundle under 250 MB.
[[plugins]]
  package = "./netlify/plugins/prune-handler"

# CDN caching — pages cached 60s at edge, static assets cached 1 year
# stale-while-revalidate kept short (10s) so deploys are visible immediately.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, s-maxage=60, stale-while-revalidate=10"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Protected routes — never cache at CDN or browser
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/lms/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/student-portal/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/staff-portal/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/employer-portal/*"
  [headers.values]
    Cache-Control = "private, no-store"

[[headers]]
  for = "/mentor/*"
  [headers.values]
    Cache-Control = "private, no-store"

