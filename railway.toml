# Railway deployment — Elevate LMS + Admin services
# Project: 625c22f0-6b8c-47a2-b75c-9f1c903fb263
#
# Two services, same repo, different Dockerfiles:
#   Elevate-lms   (da04d075) — /lms, /learner, /api/lms, /api/generate-video
#   Elevate-admin (ec557bf2) — /admin, /instructor, /api/admin
#
# Netlify serves public marketing pages and proxies LMS/admin to Railway.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
startCommand = "node --max-http-header-size=32768 server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Daily follow-up emails for funded applicants stuck in pending_funding or
# pending_admin_review. Runs at 09:00 ET (14:00 UTC) every day.
# Requires CRON_SECRET env var set in Railway service variables.
[[cron]]
schedule = "0 14 * * *"
command = "curl -sf -H 'x-cron-secret: $CRON_SECRET' http://localhost:$PORT/api/cron/funding-followup || true"
