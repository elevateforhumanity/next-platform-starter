version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install -g pnpm@10.28.2 --silent
      # Install native libs required by the optional canvas package (used by video studio API routes).
      - dnf install -y gcc-c++ cairo-devel pango-devel libjpeg-turbo-devel giflib-devel pixman-devel 2>/dev/null || yum install -y gcc-c++ cairo-devel pango-devel libjpeg-turbo-devel giflib-devel pixman-devel 2>/dev/null || true
      - docker buildx create --use --name elevate-builder || true
      - docker buildx create --use --name multiarch --driver docker-container
      - docker buildx inspect --bootstrap

  pre_build:
    commands:
      - echo Logging in to ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - export IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - export COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export COMMIT_REF=$CODEBUILD_RESOLVED_SOURCE_VERSION
      - export NEXT_PUBLIC_SUPABASE_URL=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_SUPABASE_URL --with-decryption --query Parameter.Value --output text)
      - export NEXT_PUBLIC_SUPABASE_ANON_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_SUPABASE_ANON_KEY --with-decryption --query Parameter.Value --output text)
      - export SUPABASE_SERVICE_ROLE_KEY=$(aws ssm get-parameter --name /elevate/SUPABASE_SERVICE_ROLE_KEY --with-decryption --query Parameter.Value --output text)
      - export SSN_SALT=$(aws ssm get-parameter --name /elevate/SSN_SALT --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export OPENAI_API_KEY=$(aws ssm get-parameter --name /elevate/OPENAI_API_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export GEMINI_API_KEY=$(aws ssm get-parameter --name /elevate/GEMINI_API_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export GROQ_API_KEY=$(aws ssm get-parameter --name /elevate/GROQ_API_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export SENDGRID_API_KEY=$(aws ssm get-parameter --name /elevate/SENDGRID_API_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export STRIPE_SECRET_KEY=$(aws ssm get-parameter --name /elevate/STRIPE_SECRET_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export STRIPE_PUBLISHABLE_KEY=$(aws ssm get-parameter --name /elevate/STRIPE_PUBLISHABLE_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export UPSTASH_REDIS_REST_URL=$(aws ssm get-parameter --name /elevate/UPSTASH_REDIS_REST_URL --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export UPSTASH_REDIS_REST_TOKEN=$(aws ssm get-parameter --name /elevate/UPSTASH_REDIS_REST_TOKEN --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXTAUTH_SECRET=$(aws ssm get-parameter --name /elevate/NEXTAUTH_SECRET --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export CRON_SECRET=$(aws ssm get-parameter --name /elevate/CRON_SECRET --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export GITHUB_TOKEN=$(aws ssm get-parameter --name /elevate/GITHUB_TOKEN --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export TWILIO_AUTH_TOKEN=$(aws ssm get-parameter --name /elevate/TWILIO_AUTH_TOKEN --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export AFFIRM_PUBLIC_KEY=$(aws ssm get-parameter --name /elevate/AFFIRM_PUBLIC_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export AFFIRM_PRIVATE_KEY=$(aws ssm get-parameter --name /elevate/AFFIRM_PRIVATE_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export PARTNER_WEBHOOK_SECRET=$(aws ssm get-parameter --name /elevate/PARTNER_WEBHOOK_SECRET --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export SAM_GOV_API_KEY=$(aws ssm get-parameter --name /elevate/SAM_GOV_API_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export CLOUDFLARE_ACCOUNT_ID=$(aws ssm get-parameter --name /elevate/CLOUDFLARE_ACCOUNT_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export CLOUDFLARE_R2_ACCESS_KEY_ID=$(aws ssm get-parameter --name /elevate/CLOUDFLARE_R2_ACCESS_KEY_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_SITE_URL=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_SITE_URL --with-decryption --query Parameter.Value --output text)
      - export NEXT_PUBLIC_ADMIN_URL="https://admin.elevateforhumanity.org"
      - export NEXT_PUBLIC_SEZZLE_MERCHANT_ID=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_SEZZLE_MERCHANT_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_SEZZLE_PUBLIC_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_SEZZLE_PUBLIC_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export SEZZLE_PRIVATE_KEY=$(aws ssm get-parameter --name /elevate/SEZZLE_PRIVATE_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY --with-decryption --query Parameter.Value --output text)
      - export NEXT_PUBLIC_TURNSTILE_SITE_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_TURNSTILE_SITE_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_GA_MEASUREMENT_ID=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_GA_MEASUREMENT_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_FACEBOOK_PIXEL_ID=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_FACEBOOK_PIXEL_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_GOOGLE_ADS_ID=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_GOOGLE_ADS_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_LMS_URL=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_LMS_URL --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_ENVIRONMENT=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_ENVIRONMENT --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "production")
      - export NEXT_PUBLIC_BUILD_ID=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export NEXT_PUBLIC_CALENDLY_URL=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_CALENDLY_URL --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_SENTRY_DSN=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_SENTRY_DSN --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_VAPID_PUBLIC_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_VAPID_PUBLIC_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_AFFIRM_PUBLIC_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_AFFIRM_PUBLIC_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_INTERCOM_APP_ID=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_INTERCOM_APP_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_TAWK_PROPERTY_ID=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_TAWK_PROPERTY_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_TAWK_WIDGET_ID=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_TAWK_WIDGET_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_TIDIO_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_TIDIO_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_HCAPTCHA_SITE_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_HCAPTCHA_SITE_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_RAPIDS_PROGRAM_NUMBER=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_RAPIDS_PROGRAM_NUMBER --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_RAPIDS_SPONSOR_NAME=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_RAPIDS_SPONSOR_NAME --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_RTI_PROVIDER_ID=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_RTI_PROVIDER_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_CDN_DOMAIN=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_CDN_DOMAIN --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_VIMEO_BASE_URL=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_VIMEO_BASE_URL --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_COLLABORATION_WS_URL=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_COLLABORATION_WS_URL --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_ANALYTICS_ENDPOINT=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_ANALYTICS_ENDPOINT --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_ZENDESK_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_ZENDESK_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_BING_VERIFICATION=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_BING_VERIFICATION --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_GITHUB_ENABLED=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_GITHUB_ENABLED --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_SEZZLE_ENVIRONMENT=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_SEZZLE_ENVIRONMENT --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_ELEVENLABS_API_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_ELEVENLABS_API_KEY --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_XAPI_ENDPOINT=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_XAPI_ENDPOINT --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
      - export NEXT_PUBLIC_FACEBOOK_APP_ID=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_FACEBOOK_APP_ID --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")

  build:
    commands:
      - echo Installing dependencies...
      - pnpm install --frozen-lockfile
      - echo Clearing stale build artifacts...
      - rm -rf .next apps/admin/.next
      - echo Building Admin...
      - export NODE_OPTIONS="--max-old-space-size=8192 --max-semi-space-size=32 --expose-gc"
      - export NEXT_TELEMETRY_DISABLED=1
      - export BUILD_SCOPE=1
      - cd apps/admin && pnpm next build && cd ../..
      - echo Packaging Docker image...
      - docker buildx build --platform linux/amd64 --load -f Dockerfile.admin --build-arg COMMIT_REF=$COMMIT_REF -t $IMAGE_URI:latest -t $IMAGE_URI:$COMMIT_HASH .

  post_build:
    commands:
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" != "1" ]; then
          echo "Build failed; skipping push and deploy."
          exit 1
        fi
      - echo "Validating required env vars before push..."
      - node scripts/validate-env.js admin
      - echo Pushing images...
      - docker push $IMAGE_URI:latest
      - docker push $IMAGE_URI:$COMMIT_HASH
      - echo Registering new task definition...
      - |
        CURRENT_TASK_DEF=$(aws ecs describe-task-definition \
          --task-definition elevate-admin \
          --region $AWS_DEFAULT_REGION \
          --query 'taskDefinition' --output json)
        NEW_TASK_DEF=$(echo "$CURRENT_TASK_DEF" | python3 -c "
        import json, sys
        t = json.load(sys.stdin)
        t['containerDefinitions'][0]['image'] = '$IMAGE_URI:$COMMIT_HASH'
        for f in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
            t.pop(f, None)
        print(json.dumps(t))
        ")
        NEW_TASK_ARN=$(aws ecs register-task-definition \
          --region $AWS_DEFAULT_REGION \
          --cli-input-json "$NEW_TASK_DEF" \
          --query 'taskDefinition.taskDefinitionArn' --output text)
        echo "Registered: $NEW_TASK_ARN"
        aws ecs update-service \
          --cluster elevate-cluster \
          --service elevate-admin-service \
          --task-definition "$NEW_TASK_ARN" \
          --region $AWS_DEFAULT_REGION \
          --query 'service.taskDefinition' --output text
        echo "Service updated."
      - printf '[{"name":"elevate-admin","imageUri":"%s"}]' $IMAGE_URI:$COMMIT_HASH > imagedefinitions.json

cache:
  paths:
    - node_modules/**/*
    - apps/admin/node_modules/**/*
    - .pnpm-store/**/*
    - /root/.local/share/pnpm/store/**/*

artifacts:
  files:
    - imagedefinitions.json
