version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install -g pnpm@10.28.2 --silent

  pre_build:
    commands:
      - echo Logging in to ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export NEXT_PUBLIC_SUPABASE_URL=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_SUPABASE_URL --with-decryption --query Parameter.Value --output text)
      - export NEXT_PUBLIC_SUPABASE_ANON_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_SUPABASE_ANON_KEY --with-decryption --query Parameter.Value --output text)
      - export NEXT_PUBLIC_SITE_URL=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_SITE_URL --with-decryption --query Parameter.Value --output text)
      - export NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$(aws ssm get-parameter --name /elevate/NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY --with-decryption --query Parameter.Value --output text)

  build:
    commands:
      # Install root deps (shared lib/, components/) + admin app deps
      - echo Installing dependencies...
      - pnpm install --frozen-lockfile
      - cd apps/admin && pnpm install --frozen-lockfile && cd ../..
      # Run next build on host — avoids Docker memory cap
      - echo Building Admin...
      - export NODE_OPTIONS="--max-old-space-size=8192 --max-semi-space-size=64 --expose-gc"
      - export NEXT_TELEMETRY_DISABLED=1
      - export BUILD_SCOPE=1
      - cd apps/admin && pnpm next build && cd ../..
      # Package the pre-built .next/standalone into a Docker image (no compilation)
      - echo Packaging Docker image...
      - docker build -f Dockerfile.admin -t $IMAGE_URI:latest -t $IMAGE_URI:$COMMIT_HASH .

  post_build:
    commands:
      - echo Pushing images...
      - docker push $IMAGE_URI:latest
      - docker push $IMAGE_URI:$COMMIT_HASH
      # Register new task definition with updated image and deploy to ECS
      - echo Deploying to ECS...
      - TASK_DEF=$(aws ecs describe-task-definition --task-definition elevate-admin --region $AWS_DEFAULT_REGION --query taskDefinition)
      - NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "import json,sys; t=json.load(sys.stdin); t['containerDefinitions'][0]['image']='$IMAGE_URI:$COMMIT_HASH'; [t.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy','deregisteredAt']]; print(json.dumps(t))")
      - NEW_TASK_ARN=$(aws ecs register-task-definition --region $AWS_DEFAULT_REGION --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
      - aws ecs update-service --cluster elevate-cluster --service elevate-admin-service --task-definition $NEW_TASK_ARN --region $AWS_DEFAULT_REGION --force-new-deployment
      - echo Deployed $NEW_TASK_ARN
      - printf '[{"name":"elevate-admin","imageUri":"%s"}]' $IMAGE_URI:$COMMIT_HASH > imagedefinitions.json
      - rm -rf apps/admin/.next apps/admin/node_modules || true

artifacts:
  files:
    - imagedefinitions.json
