tasks:
  setup-env:
    name: Setup environment
    description: Assemble .env.local from secret chunks on every start, or fall back to .env.example.
    command: |
      # Always reassemble so secret changes take effect without manual intervention.
      if [ -f .env_local_1.txt ] && [ -f .env_local_2.txt ] && [ -f .env_local_3.txt ]; then
        cat .env_local_1.txt .env_local_2.txt .env_local_3.txt > .env.local
        echo "Assembled .env.local from secret chunks"
      elif [ -f .env.example ]; then
        cp .env.example .env.local
        echo "Created .env.local from .env.example (no secret chunks found)"
      else
        echo "No env source found — create .env.local manually"
      fi
    triggeredBy:
      - postDevcontainerStart

  install-deps:
    name: Install dependencies
    description: Enable corepack and install pnpm dependencies.
    command: |
      sudo corepack enable
      corepack prepare pnpm@10.28.2 --activate
      pnpm install
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - setup-env

  generate-hvac-audio:
    name: Generate HVAC audio
    description: Generate Marcus Johnson MP3 voiceovers for all 94 HVAC lessons via OpenAI TTS. Skips lessons that already have audio. No-ops silently if OPENAI_API_KEY is not set.
    command: |
      if [ -z "$OPENAI_API_KEY" ]; then
        echo "OPENAI_API_KEY not set — skipping HVAC audio generation"
        exit 0
      fi
      npx tsx scripts/generate-hvac-audio.ts
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - install-deps

  generate-hvac-videos:
    name: Generate HVAC videos
    description: Generate D-ID talking-head MP4s for all 94 HVAC lessons. Requires HVAC MP3s to exist first. Skips lessons that already have a video. No-ops silently if DID_API_KEY is not set.
    command: |
      if [ -z "$DID_API_KEY" ]; then
        echo "DID_API_KEY not set — skipping HVAC video generation"
        exit 0
      fi
      npx tsx scripts/generate-hvac-videos-did.ts
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - generate-hvac-audio

services:
  dev-server:
    name: Dev Server
    description: Next.js development server with Turbopack on port 3000.
    commands:
      start: pnpm dev
      stop: kill $(lsof -ti:3000) 2>/dev/null || true
      ready: curl -sf http://localhost:3000
